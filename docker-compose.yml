# ============================================================
# Confluent Kafka with mTLS (Mutual TLS) Authentication
# ============================================================
# Ports:
#   9093 - Kafka mTLS listener (external clients)
#   9092 - Kafka PLAINTEXT listener (internal only, optional)
#   2181 - ZooKeeper
#   8081 - Schema Registry (optional)
# ============================================================

services:

  # ----------------------------------------------------------
  # ZooKeeper
  # ----------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    hostname: zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
    ports:
      - "2181:2181"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # Kafka Broker with mTLS
  # ----------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-broker
    hostname: kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"    # Internal PLAINTEXT (disable in production)
      - "9093:9093"    # External mTLS listener
    volumes:
      - kafka-data:/var/lib/kafka/data
      - ./certs:/etc/kafka/secrets:ro   # Mount certificates as read-only
    environment:
      # ---- Broker Identity ----
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      # ---- Listeners ----
      # PLAINTEXT  → internal Docker network only
      # SSL        → mTLS for external clients on port 9093
      KAFKA_LISTENERS: >-
        PLAINTEXT://0.0.0.0:9092,
        SSL://0.0.0.0:9093

      KAFKA_ADVERTISED_LISTENERS: >-
        PLAINTEXT://kafka:9092,
        SSL://localhost:9093

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: >-
        PLAINTEXT:PLAINTEXT,
        SSL:SSL

      # Inter-broker uses PLAINTEXT inside Docker network
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      # ---- SSL / mTLS Configuration ----
      KAFKA_SSL_KEYSTORE_FILENAME: kafka.keystore.jks
      KAFKA_SSL_KEYSTORE_CREDENTIALS: keystore_creds
      KAFKA_SSL_KEY_CREDENTIALS: keystore_creds
      KAFKA_SSL_TRUSTSTORE_FILENAME: kafka.truststore.jks
      KAFKA_SSL_TRUSTSTORE_CREDENTIALS: truststore_creds

      # REQUIRED = enforce mTLS (clients MUST present a certificate)
      KAFKA_SSL_CLIENT_AUTH: required

      # ---- Topic & Replication Defaults ----
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1

      # ---- Performance Tuning ----
      KAFKA_LOG_RETENTION_HOURS: 168        # 7 days
      KAFKA_LOG_SEGMENT_BYTES: 1073741824   # 1 GB
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

      # ---- JVM ----
      KAFKA_HEAP_OPTS: "-Xmx1G -Xms512M"

      # ---- Logging ----
      KAFKA_LOG4J_ROOT_LOGLEVEL: INFO
      KAFKA_LOG4J_LOGGERS: >-
        kafka.controller=INFO,
        kafka.producer.async.DefaultEventHandler=INFO,
        state.change.logger=INFO

    healthcheck:
      test: >-
        ["CMD", "kafka-broker-api-versions", "--bootstrap-server",
         "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ----------------------------------------------------------
  # Schema Registry (optional but recommended)
  # ----------------------------------------------------------
  schema-registry:
    image: confluentinc/cp-schema-registry:7.5.0
    container_name: schema-registry
    hostname: schema-registry
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
      SCHEMA_REGISTRY_KAFKASTORE_SECURITY_PROTOCOL: PLAINTEXT

  # ----------------------------------------------------------
  # Kafka UI (optional - for monitoring)
  # ----------------------------------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local-mtls-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181

volumes:
  zookeeper-data:
  zookeeper-logs:
  kafka-data:

networks:
  default:
    name: kafka-mtls-network
