# ============================================================
# Confluent Kafka with mTLS (Mutual TLS) Authentication
# ============================================================
# Ports:
#   9093 - Kafka mTLS listener (external clients)
#   9092 - Kafka PLAINTEXT listener (internal only, optional)
#   2182 - ZooKeeper
#   8081 - Schema Registry (optional)
# ============================================================

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    platform: linux/amd64
    hostname: zookeeper
    networks: [kafka-net]
    volumes:
      - ~/Confluent-kafka/config/zookeeper_jaas.conf:/etc/kafka/zookeeper_jaas.conf:ro
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_AUTH_PROVIDER_1: "" 
      ZOOKEEPER_REQUIRE_CLIENT_AUTH_SCHEME: sasl 
      KAFKA_OPTS: "-Djava.security.auth.login.config=/etc/kafka/zookeeper_jaas.conf"   
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/2181 && echo ruok >&3 && cat <&3 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    platform: linux/amd64
    hostname: kafka
    networks: [kafka-net]
    ports:
      - "9092:9092"
      - "9093:9093"
      - "9094:9094"
    depends_on:
      zookeeper:
        condition: service_healthy
    volumes:
      - ~/Confluent-kafka/certs:/etc/kafka/secrets:ro
      - ~/Confluent-kafka/config/kafka_server_jaas.conf:/etc/kafka/kafka_server_jaas.conf:ro

    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      KAFKA_LISTENERS:            PLAINTEXT://0.0.0.0:9092,SSL://0.0.0.0:9093,SASL_SSL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,SSL://kafka:9093,SASL_SSL://kafka:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,SSL:SSL,SASL_SSL:SASL_SSL
      KAFKA_INTER_BROKER_LISTENER_NAME: SASL_SSL

      KAFKA_SASL_ENABLED_MECHANISMS: PLAIN
      KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: PLAIN
      # Required by dub — points to JAAS file for Kafka listeners
      KAFKA_OPTS: >-
        -Djava.security.auth.login.config=/etc/kafka/kafka_server_jaas.conf
   
      KAFKA_SSL_KEYSTORE_FILENAME:        kafka.keystore.jks
      KAFKA_SSL_KEYSTORE_CREDENTIALS:     keystore_creds
      KAFKA_SSL_KEY_CREDENTIALS:          keystore_creds
      KAFKA_SSL_TRUSTSTORE_FILENAME:      kafka.truststore.jks
      KAFKA_SSL_TRUSTSTORE_CREDENTIALS:   truststore_creds
      KAFKA_SSL_CLIENT_AUTH:              required

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 2>/dev/null | grep -q '0'"]
      interval: 15s
      timeout: 15s
      retries: 10
      start_period: 45s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    platform: linux/amd64
    hostname: kafka-ui
    networks: [kafka-net]
    ports:
      - "8080:8080"
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ~/Confluent-kafka/certs:/certs:ro
      - ~/Confluent-kafka/config/kafka-ui.yml:/app/config.yml:ro
      
    environment:
      SPRING_CONFIG_ADDITIONAL_LOCATION: /app/config.yml
      
networks:
  kafka-net:
    driver: bridge
